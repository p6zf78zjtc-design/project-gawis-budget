
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Gawis Budget</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;margin:0;padding:20px}
.card{max-width:700px;margin:auto;background:#1c1c1c;padding:20px;border-radius:12px}
input,button{width:100%;padding:12px;font-size:16px;margin:8px 0;border-radius:8px;border:none}
button{background:#0a84ff;color:#fff;font-weight:bold;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:15px}
td{padding:8px;border-bottom:1px solid #333}
canvas{display:block;margin:20px auto;background:#222;border-radius:50%}
</style>
</head>
<body>
<div class="card">
<h2>🎥 Project Gawis Budget</h2>
<input id="income" type="number" placeholder="Hal. 5000">
<button onclick="compute()">Compute</button>

<table id="tbl" style="display:none"><tbody></tbody></table>
<canvas id="pie" width="280" height="280"></canvas>
</div>

<script>
function getAlloc(income){
 let fixed={Bayarin:1000,Gear:1000,Kuryente:100,Tubig:80,Emergency:300};
 let business=0,car=0,pa=0;
 if(income<=3000){business=300;car=200;pa=200;}
 else if(income<=5000){business=700;car=300;pa=300;}
 else if(income<=8000){business=1200;car=700;pa=600;}
 else if(income<=10000){business=2000;car=800;pa=700;}
 else{
   business=Math.round(income*0.20);
   car=Math.round(income*0.10);
   pa=Math.round(income*0.08);
 }
 let personal=income-(fixed.Bayarin+fixed.Gear+fixed.Kuryente+fixed.Tubig+fixed.Emergency+business+car+pa);
 return [
 ["🚨 Bayarin",fixed.Bayarin],
 ["🎥 Gear",fixed.Gear],
 ["🏢 Business",business],
 ["🚗 Car",car],
 ["🤝 PA",pa],
 ["⚡ Kuryente",fixed.Kuryente],
 ["💧 Tubig",fixed.Tubig],
 ["🚑 Emergency",fixed.Emergency],
 ["💰 Personal",personal]
 ];
}

function drawPie(rows){
 const c=document.getElementById("pie");
 const ctx=c.getContext("2d");
 ctx.clearRect(0,0,c.width,c.height);
 const colors=["#ff6384","#36a2eb","#ffcd56","#4bc0c0","#9966ff","#ff9f40","#8dd17e","#c9cbcf","#66bb6a"];
 const total=rows.reduce((a,b)=>a+b[1],0);
 let start=0;
 rows.forEach((r,i)=>{
   let slice=(r[1]/total)*Math.PI*2;
   ctx.beginPath();
   ctx.moveTo(140,140);
   ctx.arc(140,140,120,start,start+slice);
   ctx.closePath();
   ctx.fillStyle=colors[i%colors.length];
   ctx.fill();
   start+=slice;
 });
}

function compute(){
 const income=parseFloat(document.getElementById("income").value);
 if(isNaN(income)||income<=0){alert("Maglagay ng valid income.");return;}
 const rows=getAlloc(income);
 const tbody=document.querySelector("#tbl tbody");
 tbody.innerHTML="";
 rows.forEach(r=>{
   tbody.innerHTML+=`<tr><td>${r[0]}</td><td>₱${r[1].toLocaleString()}</td></tr>`;
 });
 document.getElementById("tbl").style.display="table";
 drawPie(rows);
}
</script>
</body>
</html>
